services:
  postgres:
    image: postgres:16-alpine
    container_name: unplgd_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - unplgd_postgres_prod_data:/var/lib/postgresql/data
    # Bind only to host loopback so Adminer (running natively on the VPS) can
    # reach it via 127.0.0.1:5434 without exposing the DB to the internet.
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [unplgd_net]

  redis:
    image: redis:7-alpine
    container_name: unplgd_redis_prod
    restart: unless-stopped
    volumes:
      - unplgd_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [unplgd_net]

  backend:
    build: .
    container_name: unplgd_backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      BLE_SECRET: ${BLE_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      TTS_CACHE_DIR: /data/tts-cache
      TTS_PROVIDER: ${TTS_PROVIDER:-edge}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_BUCKET: ${GCP_BUCKET:-}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-europe-west4}
      IMAGEN_MODEL: ${IMAGEN_MODEL:-imagen-3.0-generate-002}
      HUNT_DEV_MODE: ${HUNT_DEV_MODE:-false}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      REPLICATE_RVC_VERSION: ${REPLICATE_RVC_VERSION:-bbdb9b991f627b94d5fa92f0a3eb4037f224bb79cf56ff46b70afe84ce7bb646}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - unplgd_tts_cache:/data/tts-cache
    ports:
      - "127.0.0.1:4001:4000"
    networks: [unplgd_net]

volumes:
  unplgd_postgres_prod_data:
  unplgd_redis_prod_data:
  unplgd_tts_cache:

networks:
  unplgd_net:
    driver: bridge
