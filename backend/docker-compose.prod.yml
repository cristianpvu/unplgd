services:
  postgres:
    image: postgres:16-alpine
    container_name: unplgd_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - unplgd_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [unplgd_net]

  redis:
    image: redis:7-alpine
    container_name: unplgd_redis_prod
    restart: unless-stopped
    volumes:
      - unplgd_redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [unplgd_net]

  backend:
    build: .
    container_name: unplgd_backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:4001:4000"
    networks: [unplgd_net]

volumes:
  unplgd_postgres_prod_data:
  unplgd_redis_prod_data:

networks:
  unplgd_net:
    driver: bridge
