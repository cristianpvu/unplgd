services:
  postgres:
    image: postgres:16-alpine
    container_name: unplgd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unplgd
      POSTGRES_PASSWORD: unplgd_dev
      POSTGRES_DB: unplgd
    ports:
      - "5433:5432"
    volumes:
      - unplgd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unplgd -d unplgd"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: unplgd_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - unplgd_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  unplgd_postgres_data:
  unplgd_redis_data:
