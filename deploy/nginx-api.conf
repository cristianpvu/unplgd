server {
    server_name api-unplgd.dinedroid.com;
    client_max_body_size 2M;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # RVC voice conversion via Replicate poate dura 30s-3min la cold start
        # (download model .zip de pe HuggingFace + GPU warmup). Default 60s
        # pe nginx producea 504. Cresc la 5 min, in linie cu timeout-ul intern
        # din lib/ai/voiceConvert.ts.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    listen 80;
}
